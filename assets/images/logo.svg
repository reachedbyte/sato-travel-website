<svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg" width="240" height="60" preserveAspectRatio="xMinYMid meet">
  <!-- Circular background for the O with plane inside -->
  <circle cx="30" cy="30" r="22" fill="none" stroke="#ffbe3d" stroke-width="1.5" opacity="0.3"/>
  <circle cx="30" cy="30" r="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
  <circle cx="30" cy="30" r="15" fill="none" stroke="#ffbe3d" stroke-width="1.2"/>

  <!-- Plane forming the O -->
  <!-- Fuselage (body) -->
  <ellipse cx="30" cy="30" rx="6" ry="9" fill="#ffbe3d"/>

  <!-- Cockpit (front) -->
  <circle cx="30" cy="23" r="2" fill="#ffbe3d"/>

  <!-- Left Wing -->
  <path d="M 24 29 L 10 27 L 16 31 Z" fill="#ffbe3d"/>

  <!-- Right Wing -->
  <path d="M 36 29 L 50 27 L 44 31 Z" fill="#ffbe3d"/>

  <!-- Tail forming the curved bottom of O -->
  <path d="M 27 38 Q 30 43 33 38" fill="none" stroke="#ffbe3d" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tail fin -->
  <path d="M 28.5 38 L 27 42 L 31.5 38 Z" fill="#ffbe3d"/>

  <!-- Text: SATOTRAVEL -->
  <text x="62" y="40" font-family="'Cormorant Garamond', serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.5">SATOTRAVEL</text>

  <!-- Subtitle: AND TOURS -->
  <text x="62" y="56" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#ffbe3d" letter-spacing="1.2" text-transform="uppercase">AND TOURS</text>
</svg>
