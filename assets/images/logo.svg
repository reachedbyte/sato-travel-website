<svg class="brand-logo" viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg" width="320" height="60" preserveAspectRatio="xMinYMid meet">
  <!-- Circular O outline -->
  <circle cx="30" cy="30" r="22" fill="none" stroke="#ffbe3d" stroke-width="1.5" opacity="0.3"/>
  <circle cx="30" cy="30" r="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
  <circle cx="30" cy="30" r="15" fill="none" stroke="#ffbe3d" stroke-width="1.2"/>

  <!-- Airplane INSIDE the O -->
  <!-- Fuselage (body) -->
  <ellipse cx="30" cy="32" rx="4" ry="7" fill="#ffbe3d"/>

  <!-- Cockpit (nose) -->
  <circle cx="30" cy="25" r="1.5" fill="#ffbe3d"/>

  <!-- Left Wing -->
  <path d="M 26 31 L 14 30 L 20 32 Z" fill="#ffbe3d"/>

  <!-- Right Wing -->
  <path d="M 34 31 L 46 30 L 40 32 Z" fill="#ffbe3d"/>

  <!-- Tail -->
  <path d="M 29 39 L 30 44 L 31 39 Z" fill="#ffbe3d"/>

  <!-- Tail wing -->
  <path d="M 27 40 L 33 40" stroke="#ffbe3d" stroke-width="1" stroke-linecap="round"/>

  <!-- Text: OSATO -->
  <text x="60" y="40" font-family="'Cormorant Garamond', serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.3">OSATO</text>

  <!-- Text: TRAVEL -->
  <text x="160" y="40" font-family="'Cormorant Garamond', serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.3">TRAVEL</text>

  <!-- Subtitle: AND TOURS -->
  <text x="60" y="56" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#ffbe3d" letter-spacing="1" text-transform="uppercase">AND TOURS</text>
</svg>
