<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Background -->
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050506;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#17120b;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#heroBg)"/>

  <!-- Decorative Elements - Subtle Travel Icons -->

  <!-- Floating Globe - Top Right -->
  <g opacity="0.08">
    <circle cx="950" cy="100" r="80" fill="none" stroke="#ffbe3d" stroke-width="1"/>
    <circle cx="950" cy="100" r="75" fill="none" stroke="#ffbe3d" stroke-width="0.5"/>
    <!-- Continents hint -->
    <path d="M 900 80 Q 920 60 950 65" fill="none" stroke="#ffbe3d" stroke-width="1"/>
    <path d="M 920 120 Q 950 130 970 115" fill="none" stroke="#ffbe3d" stroke-width="1"/>
  </g>

  <!-- Passport Icon - Left Side -->
  <g opacity="0.12">
    <rect x="80" y="200" width="120" height="160" rx="4" fill="none" stroke="#ffbe3d" stroke-width="2"/>
    <rect x="95" y="215" width="90" height="60" rx="2" fill="none" stroke="#ffbe3d" stroke-width="1.5"/>
    <circle cx="140" cy="245" r="15" fill="none" stroke="#ffbe3d" stroke-width="1"/>
    <path d="M 95 285 L 185 285" stroke="#ffbe3d" stroke-width="1"/>
    <path d="M 95 300 L 185 300" stroke="#ffbe3d" stroke-width="1"/>
    <path d="M 95 315 L 160 315" stroke="#ffbe3d" stroke-width="1"/>
  </g>

  <!-- Plane Icon - Center Right -->
  <g opacity="0.1" transform="translate(1050, 300) rotate(-35)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="35" ry="8" fill="none" stroke="#ffbe3d" stroke-width="1.5"/>
    <!-- Wings -->
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#ffbe3d" stroke-width="2"/>
    <line x1="-15" y1="-8" x2="-15" y2="8" stroke="#ffbe3d" stroke-width="1"/>
    <!-- Tail -->
    <line x1="35" y1="-5" x2="45" y2="-10" stroke="#ffbe3d" stroke-width="1.5"/>
    <line x1="35" y1="5" x2="45" y2="10" stroke="#ffbe3d" stroke-width="1.5"/>
  </g>

  <!-- Map/Pin Icons - Bottom Left -->
  <g opacity="0.09">
    <!-- Pin 1 -->
    <circle cx="150" cy="650" r="6" fill="none" stroke="#ffbe3d" stroke-width="1.5"/>
    <path d="M 150 656 L 145 670 Q 150 678 155 670 Z" fill="none" stroke="#ffbe3d" stroke-width="1.5"/>
    <!-- Pin 2 -->
    <circle cx="280" cy="700" r="6" fill="none" stroke="#ffbe3d" stroke-width="1.5"/>
    <path d="M 280 706 L 275 720 Q 280 728 285 720 Z" fill="none" stroke="#ffbe3d" stroke-width="1.5"/>
    <!-- Connecting line -->
    <path d="M 156 670 Q 200 700 274 720" fill="none" stroke="#ffbe3d" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Visa Stamp - Top Left -->
  <g opacity="0.11">
    <rect x="1050" y="50" width="80" height="80" rx="2" fill="none" stroke="#ffbe3d" stroke-width="2" transform="rotate(-25 1090 90)"/>
    <text x="1090" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffbe3d" text-anchor="middle" opacity="0.6" transform="rotate(-25 1090 90)">VISA</text>
  </g>

  <!-- Decorative Lines -->
  <line x1="100" y1="0" x2="150" y2="800" stroke="#ffbe3d" stroke-width="0.5" opacity="0.05"/>
  <line x1="1100" y1="0" x2="1050" y2="800" stroke="#ffbe3d" stroke-width="0.5" opacity="0.05"/>

  <!-- Circular Elements - Background -->
  <circle cx="200" cy="750" r="150" fill="none" stroke="#ffbe3d" stroke-width="0.5" opacity="0.04"/>
  <circle cx="1000" cy="150" r="200" fill="none" stroke="#ffbe3d" stroke-width="0.5" opacity="0.04"/>

  <!-- Subtle Grid Pattern -->
  <g opacity="0.02" stroke="#ffbe3d" stroke-width="0.5">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
  </g>

  <!-- Accent Glow Elements -->
  <ellipse cx="600" cy="400" rx="300" ry="200" fill="#ffbe3d" opacity="0.02"/>
  <ellipse cx="200" cy="300" rx="250" ry="250" fill="#ffbe3d" opacity="0.015"/>
  <ellipse cx="1000" cy="600" rx="280" ry="200" fill="#ffbe3d" opacity="0.015"/>
</svg>
