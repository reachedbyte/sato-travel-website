<svg viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg" width="240" height="60" preserveAspectRatio="xMinYMid meet">
  <!-- Globe/Plane Icon -->
  <g>
    <!-- Circular background for icon -->
    <circle cx="30" cy="30" r="22" fill="none" stroke="#ffbe3d" stroke-width="1.5" opacity="0.3"/>
    <circle cx="30" cy="30" r="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

    <!-- Globe outline -->
    <circle cx="30" cy="30" r="15" fill="none" stroke="#ffbe3d" stroke-width="1.2"/>

    <!-- Plane/Arrow mark -->
    <path d="M 30 18 L 37 30 L 30 28 L 23 30 Z" fill="#ffbe3d"/>

    <!-- Subtle globe details -->
    <path d="M 20 30 Q 30 24 40 30" fill="none" stroke="#ffbe3d" stroke-width="0.7" opacity="0.4"/>
    <path d="M 20 30 Q 30 36 40 30" fill="none" stroke="#ffbe3d" stroke-width="0.7" opacity="0.4"/>
  </g>

  <!-- "SATO" Wordmark -->
  <text x="62" y="40" font-family="'Cormorant Garamond', serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    SATO
  </text>

  <!-- "TRAVEL & TOURS" Subtitle -->
  <text x="62" y="56" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#ffbe3d" letter-spacing="1.2" text-transform="uppercase">
    TRAVEL &amp; TOURS
  </text>
</svg>
